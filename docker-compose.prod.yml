services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.df-backend.rule=Host(`89.116.34.130.nip.io`) && (PathPrefix(`/api`) || PathPrefix(`/auth`) || PathPrefix(`/health`))"
      - "traefik.http.routers.df-backend.entrypoints=websecure"
      - "traefik.http.routers.df-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.df-backend.loadbalancer.server.port=8000"
      - "traefik.http.routers.df-backend.priority=10"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.df-frontend.rule=Host(`89.116.34.130.nip.io`)"
      - "traefik.http.routers.df-frontend.entrypoints=websecure"
      - "traefik.http.routers.df-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.df-frontend.loadbalancer.server.port=3000"
      - "traefik.http.routers.df-frontend.priority=1"

volumes:
  postgres_data:
    driver: local
